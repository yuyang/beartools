# beartools 配置文件示例
# 复制此文件为 beartools.yaml 并根据需要修改

# 日志配置
log:
  # 日志文件路径，默认: .logs/beartools.log
  path: .logs/beartools.log
  # 日志级别: DEBUG, INFO, WARNING, ERROR，默认: INFO
  level: INFO
  # 高级配置: 使用外部日志配置文件，可选
  # 支持 YAML 和 JSON 格式的标准 logging 配置
  # config_file: .config/logging.yaml

# Doctor 健康检查配置
doctor:
  # 启用哪些检查项，默认启用 google_ping 和 opencli
  enabled_checks:
    - google_ping
    - opencli

  # 各个检查项的独立配置
  checks:
    # Google Ping 检查配置
    google_ping:
      # 超时时间（秒），默认: 2
      timeout: 2

    # OpenCli 检查配置
    opencli:
      # opencli doctor 超时时间（秒），默认: 10
      timeout: 10
      # opencli doctor 执行失败时是否标记检查为失败
      # 设置为 false 只输出警告不标记为失败，默认: true
      fail_on_error: true
