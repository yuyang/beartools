# beartools 配置文件示例
# 将此文件复制为 beartools.yaml 并根据需要修改配置

# 日志配置
log:
  # 日志文件路径，默认：log/beartools.log
  path: "log/beartools.log"
  # 日志级别：DEBUG/INFO/WARNING/ERROR/CRITICAL，默认：INFO
  level: "INFO"
  # 自定义日志配置文件路径（可选），如果指定则使用该配置文件
  # config_file: "config/logging.yaml"

# Siyuan思源笔记全局配置
siyuan:
  token: "@get siyuan.token"  # 思源笔记API访问令牌，从 secrets 文件读取
  default_note: "20260401224127-avzmdmq"
  notebook: "20241024103605-12lg6a0"
  path: "/待分类"

# 健康检查配置
doctor:
  # 启用的检查项列表，默认启用所有检查
  enabled_checks:
    - "siyuan"
    - "opencli"
    - "google_ping"
    - "llm"
  
  # 各检查项的具体配置
  checks:
    # Google网络连通性检查配置
    google_ping:
      # 超时时间（秒），默认：2
      timeout: 2
      # 检查失败时是否终止运行，默认：true
      fail_on_error: true
    
    # OpenCLI可用性检查配置
    opencli:
      timeout: 15
      fail_on_error: false
    
    # Siyuan思源笔记服务检查配置
    siyuan:
      timeout: 5
      fail_on_error: false

# 智能体 (agent) 配置示例
# 注意：此段为样例配置，字段必须与 src/beartools/config.py 中的 AgentNodeConfig/AgentConfig 完全一致
# 可用字段：name、provider、base_url、model、api_key、extra_headers、timeout_seconds
# 说明：
#   - agent.primary 为必填节点（当存在 agent 段时），primary 节点会作为主目标发送请求，
#     同时也会进入随机健康池参与轮选
#   - agent.candidates 是整列表替换（即配置中的整个候选列表将被解析器替换），不是增量追加
#   - 样例中的 api_key 仅为占位符，请在生产环境使用环境变量或 secrets 注入真实密钥，样例必须使用占位文本如 REPLACE_ME
agent:
  # 主节点（必填）
  primary:
    name: "zhizengzeng"
    provider: "openai"
    base_url: "https://api.zhizengzeng.com/v1"  # 必填：节点基础 URL
    model: "gpt-5.4-mini"                 # 必填：模型标识
    api_key: "@get agent.zhizengzeng.key"
    timeout_seconds: 30

  # 候选节点列表（可选）
  # 注意：此处为整列表替换，parser 会把 candidates 解析为完整的候选集合
  candidates:
    - name: "candidate-1"
      provider: "openrouter"
      base_url: "https://openrouter.ai/api/v1"
      model: "openai/gpt-4.1-mini"
      api_key: "@get agent.openrouter.key"
      extra_headers: {}
      timeout_seconds: 25

    - name: "candidate-2"
      provider: "openrouter"
      base_url: "https://openrouter.ai/api/v1"
      model: "moonshotai/kimi-k2.6"
      api_key: "@get agent.openrouter.key"
      extra_headers:
        "X-Region": "cn"
      timeout_seconds: 20

# Gmail 配置
gmail:
  output_dir: "email"
  default_days: 3
  max_results: 100

# Codex 配置
codex:
  base_url: "https://api-xai.ainaibahub.com/v1"
  api_key: "@get agent.naiba.key"
  model: "gpt-5.5"
  pic_model: "gpt-image-2"
  instructions: "你是 Codex 助手"
  output_dir: "output/codex"
  timeout_seconds: 60
  pic_size: "1024x1024"
  pic_quality: "medium"
  pic_output_format: "png"
  pic_response_format: "b64_json"
